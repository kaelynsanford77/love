services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
    ports:
      - "4000:4000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-claude-3-5-sonnet-20241022}
      - BEARER_TOKEN=${BEARER_TOKEN:-}
      - WORKSPACES_ROOT=/workspaces
      - SANDBOX_MODE=local
    volumes:
      - workspaces:/workspaces
      - ./..:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ide:
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
    command: bun run --cwd apps/ide dev
    ports:
      - "3000:3000"
    environment:
      - VITE_ORCHESTRATOR_URL=http://localhost:4000
      - VITE_BEARER_TOKEN=${BEARER_TOKEN:-}
    depends_on:
      - orchestrator
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ide
      - orchestrator
    restart: unless-stopped

volumes:
  workspaces:
  caddy_data:
  caddy_config:
