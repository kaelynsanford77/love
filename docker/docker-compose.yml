services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-4000}:4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.quatarly.cloud/v1}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL_FAST=${LLM_MODEL_FAST:-claude-haiku-4-5-20251001}
      - LLM_MODEL_STANDARD=${LLM_MODEL_STANDARD:-claude-sonnet-4-6-thinking}
      - LLM_MODEL_POWERFUL=${LLM_MODEL_POWERFUL:-claude-opus-4-6-thinking}
      - LLM_ROUTING=${LLM_ROUTING:-auto}
      - BEARER_TOKEN=${BEARER_TOKEN:-}
      - WORKSPACES_ROOT=/workspaces
      - SANDBOX_MODE=${SANDBOX_MODE:-local}
      - DATABASE_URL=${DATABASE_URL:-}
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY:-}
    volumes:
      - workspaces:/workspaces
      - ./..:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ide:
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
    command: bun run --cwd apps/ide dev
    ports:
      - "${IDE_PORT:-3000}:3000"
    environment:
      - VITE_ORCHESTRATOR_URL=http://orchestrator:4000
      - VITE_BEARER_TOKEN=${BEARER_TOKEN:-}
    depends_on:
      - orchestrator
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ide
      - orchestrator
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    profiles:
      - postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=lovable
      - POSTGRES_PASSWORD=lovable
      - POSTGRES_DB=lovable
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovable"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  workspaces:
  caddy_data:
  caddy_config:
  postgres_data:
